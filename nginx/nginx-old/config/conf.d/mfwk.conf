server {
listen      80 default_server;
server_name dev.microfwk.clarovideo.net;
root        /inetpub/MicroFramework/;
index       index.html index.htm index.php;

        location /services {
            rewrite ^/(.*)$ /services/index.php;
        }

        location ~ /services/.*\.php$ {

            if ($fastcgi_script_name ~ /services(/.*\.php)$) {
                set $valid_fastcgi_script_name $1;
            }
            fastcgi_pass     127.0.0.1:9000;
            fastcgi_index    index.php;

            fastcgi_param    SCRIPT_FILENAME /inetpub/MicroFramework/cgi-bin$valid_fastcgi_script_name;
            fastcgi_param    TARGET_ROOT "/inetpub/MicroFramework/target/telmexmexico_dev/";
            fastcgi_param    LOG_ROOT "/inetpub/MicroFramework/log/";
            fastcgi_param    SCRIPTS_ROOT "/inetpub/MicroFramework/cgi-bin/";
            include          fastcgi_params;

            fastcgi_intercept_errors on;
        }

        location /app {
                alias    /inetpub/MicroFramework/target/telmexmexico_dev/wwwroot/;
                index    index.html index.htm;
        }
}